<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lâmpada JS</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            transition: background 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #lampada {
            width: 120px;
            height: 120px;
            background-color: #444;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #333;
            position: relative;
            transition: 0.3s;
        }

        #lampada::after {
            content: "";
            width: 40px;
            height: 30px;
            background: #666;
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 5px 5px;
        }

        .acesa {
            background-color: #ffcc00 !important;
            box-shadow: 0 0 60px #ffcc00;
            border-color: #fff !important;
        }

        .quebrada {
            background-color: #000 !important;
            opacity: 0.3;
            border: 4px dashed #777 !important;
            cursor: not-allowed !important;
        }

        .controles {
            margin-top: 60px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-break { background-color: #e74c3c; color: white; }
        .btn-fix { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>

    <h1>Lâmpada Interativa</h1>
    
    <div id="lampada" onclick="alternar()"></div>

    <div class="controles">
        <button class="btn-break" onclick="quebrar()">Quebrar</button>
        <button class="btn-fix" onclick="consertar()">Consertar</button>
    </div>

    <script>
        const lamp = document.getElementById('lampada');
        let estaQuebrada = false;

        function alternar() {
            if (estaQuebrada) return;
            lamp.classList.toggle('acesa');
        }

        function quebrar() {
            estaQuebrada = true;
            lamp.classList.remove('acesa');
            lamp.classList.add('quebrada');
        }

        function consertar() {
            estaQuebrada = false;
            lamp.classList.remove('quebrada');
            lamp.classList.remove('acesa');
        }
    </script>
</body>
</html>
