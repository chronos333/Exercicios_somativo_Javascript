<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Semáforo</title>
<link rel="stylesheet" href="style.css">
<style>
    body{
text-align:center;
font-family:Arial;
}

#semaforo{
width:100px;
background:black;
padding:20px;
margin:auto;
border-radius:10px;
}

.luz{
width:60px;
height:60px;
background:#333;
border-radius:50%;
margin:10px auto;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Semáforo</h1>

<div id="semaforo">

<div id="vermelho" class="luz"></div>
<div id="amarelo" class="luz"></div>
<div id="verde" class="luz"></div>

</div>

<br>

<button onclick="vermelho()">Vermelho</button>
<button onclick="amarelo()">Amarelo</button>
<button onclick="verde()">Verde</button>
<button onclick="automatico()">Automático</button>


</body>
<script>
    function apagar(){
document.getElementById("vermelho").style.background = "#333"
document.getElementById("amarelo").style.background = "#333"
document.getElementById("verde").style.background = "#333"
}

function vermelho(){
apagar()
document.getElementById("vermelho").style.background = "red"
}

function amarelo(){
apagar()
document.getElementById("amarelo").style.background = "yellow"
}

function verde(){
apagar()
document.getElementById("verde").style.background = "green"
}

function automatico(){

vermelho()

setTimeout(function(){
verde()
},2000)

setTimeout(function(){
amarelo()
},4000)

setTimeout(function(){
vermelho()
},6000)

}
</script>
</html>
